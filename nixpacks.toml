[phases.setup]
nixPkgs = ["php83", "php83Packages.composer", "php83Extensions.pdo_mysql", "php83Extensions.gd", "php83Extensions.mbstring", "php83Extensions.xml", "php83Extensions.curl", "php83Extensions.zip", "php83Extensions.bcmath", "php83Extensions.intl", "php83Extensions.fileinfo", "php83Extensions.tokenizer", "nodejs_20"]

[phases.install]
cmds = [
    "mkdir -p storage/framework/cache/data storage/framework/sessions storage/framework/views storage/logs bootstrap/cache storage/app/public",
    "chmod -R 777 storage bootstrap/cache",
    "composer install --no-dev --optimize-autoloader --ignore-platform-reqs --no-scripts",
    "npm ci",
    "npm run build"
]

[phases.build]
dependsOn = ["install"]
cmds = [
    "php artisan package:discover --ansi || true",
    "php artisan storage:link || true"
]

[start]
cmd = "php artisan migrate --force && php artisan serve --host=0.0.0.0 --port=${PORT:-8080}"

[variables]
APP_ENV = "production"
APP_DEBUG = "true"
APP_URL = "http://localhost"
LOG_CHANNEL = "stderr"
